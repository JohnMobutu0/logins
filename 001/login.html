<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>

    <form action="" id="login_form">
        <p id="login_head">Login</p>
        <label for="username" class="login_label"><img src="img/person.png" class="img_label" alt="person icon"></label> 
        <input type="text" class="username" id="username" placeholder="Username" required><br><br>
        <label for="password" class="login_label" ><img src="img/lock.png" alt=" lock icon"> </label>
        <input type="password" class="password" id="password" placeholder="Password" required><br><br>
        <button id="btn">Submit</button>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p> 
    </form>
</body>
</html>
